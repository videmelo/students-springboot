<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <title>Student Management System</title>
    <meta name="author" content="Julius Cavalcante">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css">
    <script src="https://kit.fontawesome.com/006642858d.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
</head>
<body>

        <div th:replace="fragments/fragments :: cabecalho"></div>

        <div class="container">
        <h3>Latest Students Adicionados</h3>
        <hr>

        <table class="table table-bordered table-hover">

        <thead>
            <th scope="col">Name</th>
            <th scope="col">Course</th>
            <th scope="col">Registration</th>
            <th scope="col">Status</th>
            <th scope="col">Shift</th>
            <th scope="col">Ação</th>

        </thead>
        <tbody>
            <tr scope="row" th:each="students : ${studentsList}">

                <td th:text="${students.name}"></td>
                <td th:text="${students.course}"></td>
                <td th:text="${students.registration}"></td>
                <td th:text="${students.status}"></td>
                <td th:text="${students.shift}"></td>
                <td>
                 <a class="btn btn-primary" th:href="@{edit/{id}(id=${students.id})}">
                 <i class="bi bi-pencil-square"></i> Edit</a>

                 <a class="btn btn-danger" th:href="@{remove/{id}(id=${students.id})}">
                 <i class="bi bi-x-square"></i> Remove</a>

                </td>
            </tr>
        </tbody>
        </table>
        </div>

        <script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
        <script src="/webjars/bootstrap/js/bootstrap.min.js"></script>
</body>
</html>
