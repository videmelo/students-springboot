<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <title> Edit Student</title>
    <meta name="author" content="Julius Cavalcante">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css">
    <script src="https://kit.fontawesome.com/006642858d.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
</head>
    <body>
        <div th:replace="fragments/fragments :: cabecalho"></div>

        <div class="container" style="margin-top: 20px;">

        <h4>Edit Student Cadastrado</h4>
        <hr>
            <form method="post" action="/edit" th:object="${student}">
            <input type="hidden" th:field="*{id}">
            <!-- Name -->
            <div class="row">
                <div class="col-md-6 form-group offset-md-3">
                <label>Name do Student:</label>
                <input class="form-control" placeholder="Ex: John Doe" th:field="*{name}">
                </div>
            </div>

                <!-- Course -->
            <div class="row">
                <div class="col-md-6 form-group offset-md-3">
                <label>Selecione o Course: </label>
                <select class="form-control" th:field="*{course}">

                    <option th:each="course : ${T(br.com.studentmanagement.enums.Course).values()}"
                    th:value="${course}" th:text="${course}"></option>

                    </select>
                    </div>
                </div>

                <!-- Registration -->
                <div class="row">
                    <div class="col-md-6 form-group offset-md-3">
                    <label>Gerar Registration: </label>
                        <input readonly="readonly" class="form-control" id="registration" th:field="*{registration}">
                        <button type="button" onclick="GerarRegistration();" class="btn-primary" style="margin-top: 10px">Gerar</button>
                    </div>
                </div>

                <!-- Shift -->
                <div class="row">
                    <div class="col-md-6 form-group offset-md-3">
                        <label>Selecione o Shift: </label>
                        <select class="form-control" th:field="*{shift}">
                            <option th:each="shift : ${T(br.com.studentmanagement.enums.Shift).values()}"
                                    th:value="${shift}" th:text="${shift}"></option>
                        </select>
                    </div>
                </div>

                <!-- Status -->
                <div class="row">
                    <div class="col-md-6 form-group offset-md-3">
                        <label>Selecione o Status: </label>
                        <select class="form-control" th:field="*{status}">
                            <option th:each="status : ${T(br.com.studentmanagement.enums.Status).values()}"
                            th:value="${status}" th:text="${status}"></option>
                        </select>
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-block">
                    <button type="submit" class="btn btn-outline-success">Save</button>
                    <a th:href="@{/students-added}" class="btn btn-outline-danger">Voltar</a>
                </div>

            </form>

            </div>

                <script src="js/main.js"></script>
                <script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
                <script src="/webjars/bootstrap/js/bootstrap.min.js"></script>
    </body>
</html>
