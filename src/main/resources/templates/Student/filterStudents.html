<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <title>Find Students</title>
    <meta name="author" content="Julius Cavalcante">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css">
    <script src="https://kit.fontawesome.com/006642858d.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/fragments :: cabecalho"></div>

    <div class="container" style="margin-top: 20px;">

    <h4>Find Students</h4>
    <hr>
        <!-- Students active -->
        <div class="row">
            <div class="card" style="width: 288px">
                <a th:href="@{/students-active}">
                <img class="card-img-top" src="img/students.active.jpg"/>
                </a>
            <div class="card-body">
                <h5 class="card-title">Todos os Students Actives no Sistema</h5>
                <p class="card-text">Lista de todos os students active no sistema.</p>
                <a th:href="@{/students-active}" class="btn btn-outline-primary">Click Here</a>
            </div>
        </div>
        <!-- Students Invactive -->
            <div class="card mx-lg-3" style="width: 288px">
                <a th:href="@{/students-inactive}">
                <img class="card-img-top" src="img/students.inactive.jpg"/>
                </a>
            <div class="card-body">
                <h5 class="card-title">Todos os Students Inactives no Sistema</h5>
                <p class="card-text">Lista de todos os students inactive no sistema.</p>
                <a th:href="@{/students-inactive}" class="btn btn-outline-primary">Click Here</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
